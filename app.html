                  ✗ TN disputes
                </button>
                <button onClick={()=>goDone("prop_accepted")}
                  style={{flex:1,padding:"9px",borderRadius:9,background:"#f1f5f9",border:"1.5px solid var(--border)",color:"#64748b",fontFamily:"var(--ff)",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                  ⏩ 3 days — silent agree
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {propResponse === "accept" && (
        <div style={{marginTop:10}}>
          <div style={{background:"#dcfce7",borderRadius:8,padding:"10px",marginBottom:10}}>
            <Row l="Claim → Landlord" r={fmt(Math.round(propDepAmount*0.6))+" USDT"} bold />
            <Row l="Remainder → Tenant" r={fmt(propDepAmount-Math.round(propDepAmount*0.6))+" USDT"} green bold />
          </div>
          <button className="btn-p" style={{background:"#059669"}} onClick={()=>goDone("prop_accepted")}>
            ✓ Confirm settlement →
          </button>
        </div>
      )}

      {propResponse === "dispute" && !propBondPaid && (
        <div style={{marginTop:10,background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"10px"}}>
          <div style={{fontSize:12,color:"#7f1d1d",lineHeight:1.6,marginBottom:10}}>
            LL must post Bond = {fmt(Math.round(propDepAmount*0.6))} USDT (claim amount) to proceed. No Bond within 3 days → claim cancelled, full deposit returns.
          </div>
          <div style={{display:"flex",gap:8}}>
            {isLL
              ? <button onClick={()=>setPropBondPaid(true)}
                  style={{flex:1,padding:"9px",borderRadius:9,background:"#dc2626",color:"white",border:"none",fontFamily:"var(--ff)",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  🔐 Post Bond {fmt(Math.round(propDepAmount*0.6))} USDT
                </button>
              : <React.Fragment>
                  <button onClick={()=>setPropBondPaid(true)}
                    style={{flex:1,padding:"9px",borderRadius:9,background:"#fef2f2",border:"1.5px solid #fca5a5",color:"#dc2626",fontFamily:"var(--ff)",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                    LL posts Bond →
                  </button>
                  <button onClick={()=>goDone("prop_bond_dropped")}
                    style={{flex:1,padding:"9px",borderRadius:9,background:"#f0fdf4",border:"1.5px solid #86efac",color:"#059669",fontFamily:"var(--ff)",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                    LL drops / 3 days pass
                  </button>
                </React.Fragment>

          </div>
        </div>
      )}

      {propResponse === "dispute" && propBondPaid && !propFreezeOpen && (
        <div style={{marginTop:10}}>
          <div style={{fontSize:12,color:"#7f1d1d",marginBottom:10}}>✓ Bond posted. Open freeze to lock all prop deposit funds.</div>
          <button onClick={()=>setPropFreezeOpen(true)}
            style={{width:"100%",padding:"10px",borderRadius:9,background:"#dc2626",color:"white",border:"none",fontFamily:"var(--ff)",fontWeight:700,fontSize:12,cursor:"pointer"}}>
            ⚖️ Freeze property deposit funds
          </button>
        </div>
      )}

      {propFreezeOpen && !propTimeSkipped && (
        <div style={{marginTop:10,background:"#f8fafc",border:"1px solid var(--border)",borderRadius:8,padding:"10px"}}>
          <div style={{fontSize:12,color:"var(--text)",lineHeight:1.8,marginBottom:10}}>
            Property deposit frozen. 60-day window. Resolve in {jurisdiction} courts or settle on-chain.
          </div>
          <button onClick={()=>setPropTimeSkipped(true)}
            style={{width:"100%",padding:"10px",borderRadius:9,background:"#64748b",color:"white",border:"none",fontFamily:"var(--ff)",fontWeight:700,fontSize:12,cursor:"pointer"}}>
            ⏩ 60 days — no agreement
          </button>
        </div>
      )}

      {propTimeSkipped && (
        <div style={{marginTop:10,background:"#dcfce7",borderRadius:8,padding:"10px"}}>
          <Row l="LL Bond → Landlord" r={"+ "+fmt(Math.round(propDepAmount*0.6))+" USDT"} green bold />
          <Row l="TN Deposit → Tenant" r={"+ "+fmt(propDepAmount)+" USDT"} green bold />
          <Row l="LL claim" r="❌ Not executed" />
          <button className="btn-p" style={{background:"#059669",marginTop:10}} onClick={()=>goDone("prop_freeze_returned")}>
            ✓ Confirm &amp; close →
          </button>
        </div>
      )}
    </Block>
  );

  // ── SCENARIO PICKER ──────────────────────────────────────────────────────────
  if (scenario === null) {
    return (
      <Overlay>
        <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>⚠️ Early Termination</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:6}}>
          {listing.title} · {listing.location} · {fmt(MR)} USDT/mo
        </div>
        <div style={{fontSize:11,color:"var(--muted)",marginBottom:16}}>
          {isLL?"🏠 Landlord":"🧳 Tenant"} · Month {monthsElapsed} of {monthsTotal} · {monthsLeft} months remaining
        </div>

        {/* S1 */}
        <div onClick={()=>setScenario(1)}
          style={{padding:"14px",borderRadius:12,border:"2px solid #a5b4fc",background:"#eef2ff",cursor:"pointer",marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:13,color:"#4338ca",marginBottom:4}}>🤝 Scenario 1 — Mutual exit, no penalties</div>
          <div style={{fontSize:12,color:"#3730a3",lineHeight:1.6}}>
            Both parties agree to part ways. Each gets their own deposit back. No one owes anything. For when both sides are fine with it — death in the family, change of plans, etc.
          </div>
        </div>

        {/* S2 */}
        <div onClick={()=>setScenario(2)}
          style={{padding:"14px",borderRadius:12,border:"2px solid #86efac",background:"#f0fdf4",cursor:"pointer",marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:13,color:"#059669",marginBottom:4}}>
            {isLL?"✅ Scenario 2 — You compensate tenant":"✅ Scenario 2 — You compensate landlord"}
          </div>
          <div style={{fontSize:12,color:"#166534",lineHeight:1.6}}>
            {isLL
              ? <>You initiate termination and accept responsibility. Your Hosting Deposit ({fmt(MR)} USDT) transfers to tenant automatically. No signature needed from tenant.</>
              : <>You initiate termination and accept responsibility. Your Commitment Deposit ({fmt(MR)} USDT) transfers to landlord automatically. No signature needed from landlord.</>}
          </div>
        </div>

        {/* S3 */}
        <div onClick={()=>setScenario(3)}
          style={{padding:"14px",borderRadius:12,border:"2px solid #fca5a5",background:"#fef2f2",cursor:"pointer"}}>
          <div style={{fontWeight:800,fontSize:13,color:"#dc2626",marginBottom:4}}>⚖️ Scenario 3 — Dispute, post Bond</div>
          <div style={{fontSize:12,color:"#7f1d1d",lineHeight:1.6}}>
            {isLL
              ? <>You want to terminate but believe your Hosting Deposit should not be forfeited — e.g. tenant violated rules. Post Bond = {fmt(MR)} USDT → freeze → court.</>
              : <>You want to leave but believe your Commitment Deposit should not be forfeited — e.g. uninhabitable conditions. Post Bond = {fmt(MR)} USDT → freeze → court.</>}
          </div>
        </div>
      </Overlay>
    );
  }

  // ── MAIN FLOW ────────────────────────────────────────────────────────────────
  return (
    <Overlay>
      <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>⚠️ Early Termination</div>
      <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>
        {listing.title} · {listing.location} · {fmt(MR)} USDT/mo
      </div>

      {/* Badge */}
      <div style={{fontSize:11,background:"#f1f5f9",borderRadius:8,padding:"5px 10px",display:"inline-flex",alignItems:"center",gap:6,color:"var(--muted)",marginBottom:14,fontWeight:600}}>
        {isLL?"🏠 LL":"🧳 TN"} · {scenario===1?"🤝 Mutual":scenario===2?"✅ Accept loss":"⚖️ Dispute"}
        <span onClick={()=>{setScenario(null);setOtherSigned(false);setBothSigned(false);setBondPaid(false);setFreezeOpen(false);setTimeSkipped(false);setPropPhase(false);setPropClaim(null);setPropResponse(null);setPropBondPaid(false);setPropFreezeOpen(false);setPropTimeSkipped(false);setPhase("main");}}
          style={{color:"var(--accent)",cursor:"pointer",fontWeight:700}}>↩ change</span>
      </div>

      {/* Contract summary */}
      <Block title="📋 Contract" color="#f8fafc">
        <Row l="Property" r={listing.title} />
        <Row l="Monthly rent" r={fmt(MR)+" USDT"} />
        <Row l="Progress" r={`Month ${monthsElapsed} of ${monthsTotal}`} />
        <Row l={isLL?"Your Hosting Deposit":"Your Commitment Deposit"} r={fmt(MR)+" USDT locked"} />
        <Row l={isLL?"Tenant Commitment Deposit":"LL Hosting Deposit"} r={fmt(MR)+" USDT locked"} />
        {propDepIncluded && <Row l="Property Security Deposit" r={fmt(propDepAmount)+" USDT locked"} />}
      </Block>

      {/* ── S1: MUTUAL ── */}
      {scenario===1 && phase==="main" && (
        <Block title="🤝 Mutual exit — both get deposits back" color="#eef2ff" border="#a5b4fc">
          <div style={{fontSize:12,color:"#3730a3",lineHeight:1.7,marginBottom:12}}>
            Both parties agree to part ways. No penalties. Each deposit returns to its owner. Requires both signatures.
          </div>
          <div style={{background:"#e0e7ff",borderRadius:8,padding:"10px 12px",marginBottom:14}}>
            <Row l={isLL?"Your Hosting Deposit → You":"Your Commitment Deposit → You"} r={"+ "+fmt(MR)+" USDT"} green bold />
            <Row l={isLL?"Tenant Commitment → Tenant":"LL Hosting → Landlord"} r="returned ✓" />
            {propDepIncluded && <Row l="Property Deposit" r="→ settle after" />}
          </div>

          {!otherSigned ? (
            <div>
              <button className="btn-p" style={{background:"#4338ca",marginBottom:10}} onClick={()=>setOtherSigned(true)}>
                ✓ I agree — sign with wallet
              </button>
              <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:8,textTransform:"uppercase"}}>Simulate other party:</div>
              <button onClick={()=>setOtherSigned(true)}
                style={{width:"100%",padding:"10px",borderRadius:9,background:"#eef2ff",border:"1.5px solid #a5b4fc",color:"#4338ca",fontFamily:"var(--ff)",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                ✓ Other party signs
              </button>
            </div>
          ) : (
            <div>
              <div style={{fontSize:12,color:"#4338ca",fontWeight:700,marginBottom:10}}>✓ Both signed on-chain.</div>
              {propDepIncluded
                ? <button className="btn-p" style={{background:"#4338ca"}} onClick={()=>setPhase("prop_deposit")}>
                    Settle property deposit →
                  </button>
                : <button className="btn-p" style={{background:"#4338ca"}} onClick={()=>goDone("clean")}>
                    Confirm termination →
                  </button>}
            </div>

      {/* ── S2: INITIATOR ACCEPTS LOSS ── */}
      {scenario===2 && phase==="main" && (
        <Block title={isLL?"✅ You compensate tenant — automatic":"✅ You compensate landlord — automatic"} color="#f0fdf4" border="#86efac">

              </button>}

      {/* ── S3: DISPUTE ── */}
      {scenario===3 && phase==="main" && (

          </div>
          <div style={{background:"#fff1f2",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
            <Row l="Your Bond (= your deposit)" r={fmt(MR)+" USDT"} bold />
            <Row l="Other party deposit (locked)" r={fmt(MR)+" USDT ✓"} />
            {propDepIncluded && <Row l="Property Deposit (locked)" r={fmt(propDepAmount)+" USDT ✓"} />}
            <Row l="Total frozen in Aave v2" r={fmt(propDepIncluded ? MR*2+propDepAmount : MR*2)+" USDT"} bold />
            <Row l="Yield → pi2pi" r="~4.2% APY" />
          </div>
          <div style={{fontSize:11,color:"#7f1d1d",lineHeight:1.6,marginBottom:12}}>

          {!bondPaid && (
            <div onClick={()=>setBondPaid(true)}

          {bondPaid && !freezeOpen && (

              ⚖️ Open freeze &amp; notify facilitator

          {freezeOpen && !timeSkipped && (
            <div style={{background:"#f8fafc",border:"1px solid var(--border)",borderRadius:10,padding:"12px",marginTop:10}}>

                All funds frozen in Aave v2. Yield → pi2pi.<br/>
                Facilitator notified — protocol rules reminder only, no sides taken.<br/>
                Settle directly or via courts in <strong>{jurisdiction}</strong>.
              </div>
              <div style={{background:"#f1f5f9",borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:11}}>
                <Row l="Your Bond" r={fmt(MR)+" USDT"} />
                <Row l="Other deposit" r={fmt(MR)+" USDT"} />
                {propDepIncluded && <Row l="Prop deposit" r={fmt(propDepAmount)+" USDT"} />}
                <Row l="Yield" r="~4.2% APY → pi2pi" />
                <Row l="Auto-release" r="freeze end" bold />
              </div>
              <button onClick={()=>setTimeSkipped(true)}
                style={{width:"100%",padding:"10px",borderRadius:9,background:"#64748b",color:"white",border:"none",fontFamily:"var(--ff)",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                ⏩ Simulate: freeze ended — no agreement
              </button>
            </div>
          )}
          {timeSkipped && (
            <div style={{background:"#dcfce7",border:"1.5px solid #86efac",borderRadius:10,padding:"12px",marginTop:10}}>
              <div style={{fontSize:12,color:"#166534",marginBottom:10,fontWeight:700}}>Freeze ended. All funds returned to owners.</div>
              <Row l="Your Bond → You" r={"+ "+fmt(MR)+" USDT"} green bold />
              <Row l="Other deposit → Other party" r={"+ "+fmt(MR)+" USDT"} />
              {propDepIncluded && <Row l="Prop deposit → Tenant" r={"+ "+fmt(propDepAmount)+" USDT"} />}
              <Row l="Claims" r="handled via court independently" />
              <button className="btn-p" style={{background:"#059669",marginTop:10}} onClick={()=>goDone("s3_returned")}>
                ✓ Confirm &amp; close →
              </button>
            </div>
          )}
        </Block>
      )}

      {/* ── PROPERTY DEPOSIT PHASE ── */}
      {phase==="prop_deposit" && <PropDepositBlock />}

      {/* ── DONE ── */}
      {phase.startsWith("done_") && (
        <div style={{textAlign:"center",padding:"24px 0"}}>
          <div style={{fontSize:48,marginBottom:12}}>
            {phase==="done_s3_returned"||phase==="done_prop_freeze_returned"?"🔓":phase==="done_prop_bond_dropped"||phase==="done_clean"?"✅":"✅"}
          </div>
          <div style={{fontWeight:800,fontSize:18,marginBottom:8}}>
            {phase==="done_clean"              ? "Termination Complete"
            :phase==="done_prop_accepted"      ? "All Settled"
            :phase==="done_s3_returned"        ? "Funds Returned"
            :phase==="done_prop_bond_dropped"  ? "Claim Cancelled — Deposit Returned"
            :phase==="done_prop_freeze_returned"? "Freeze Ended — Funds Returned"
            :"Done"}
          </div>
          <div style={{fontSize:13,color:"var(--muted)",lineHeight:2,marginBottom:20}}>
            {phase==="done_clean"               && <span>All deposits returned to each party.<br/>Contract terminated on-chain.</span>}
            {phase==="done_prop_accepted"        && <span>Termination &amp; property deposit settled.<br/>Funds distributed as agreed.</span>}
            {phase==="done_s3_returned"          && <span>Bond → You · Other deposit → Other party.<br/>Court claims handled independently in {jurisdiction}.</span>}
            {phase==="done_prop_bond_dropped"    && <span>LL did not post Bond — claim cancelled.<br/>Full property deposit → Tenant.</span>}
            {phase==="done_prop_freeze_returned" && <span>Property deposit freeze ended.<br/>Bond → LL · Deposit → Tenant. No claim executed.</span>}
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:16}}>⛓️ All transactions recorded on Ethereum Mainnet</div>
          <button className="btn-g" onClick={onClose}>Close</button>
        </div>
      )}
    </Overlay>
  );
}

function ActiveContractCard({ contract, role, onContractClose }) {
  // All hooks must come first - before any conditional returns
  const [paid, setPaid] = React.useState(false);
  const [paying, setPaying] = React.useState(false);
  const [showCheckout, setShowCheckout] = React.useState(false);
  const [showEarlyTerm, setShowEarlyTerm] = React.useState(false);
  const [showPrint, setShowPrint] = React.useState(false);

  if (!contract || !contract.listing) return null;
  const { listing, signedAt, txHash, propDepIncluded, propDepAmount, propDepMultiplier } = contract;
  if (!listing || !listing.price) return null;

  // ── CLOSED CONTRACT VIEW ──
  if (contract.closed) {
    const reasonLabel = {
      done_full_return:      "Full deposit returned to tenant",
      done_claim:            "Damage claim settled on-chain",
      ll_no_bond:            "Claim dropped — full deposit returned",
      done_dispute:          "60-day freeze ended — funds returned",
      full_return:           "Checkout complete — full deposit returned",
      accepted:              "Checkout complete — damage claim settled",
      no_deposit:            "Checkout complete — no security deposit",
      dispute_released:      "Dispute resolved — funds returned to both parties",
      claim_dropped:         "Claim cancelled — full deposit returned to tenant",

            <div style={{fontWeight:700,fontSize:15,color:"var(--text)"}}>{listing.title}</div>
            <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>📍 {listing.location}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:20,fontWeight:800,color:"var(--dim)"}}>{listing.price?.toLocaleString()}</div>
            <div style={{fontSize:11,color:"var(--dim)"}}>USDT / mo</div>
          </div>
        </div>
        <div style={{background:"#dcfce7",border:"1.5px solid #86efac",borderRadius:10,padding:"12px 14px",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{fontSize:18}}>✅</span>
            <span style={{fontWeight:800,fontSize:13,color:"#166534"}}>All funds settled on-chain</span>
          </div>
          <div style={{fontSize:12,color:"#166534",lineHeight:1.6}}>{reasonLabel}</div>
          <div style={{fontSize:11,color:"#166534",marginTop:6,fontFamily:"monospace",opacity:0.7}}>tx {txHash?.slice?.(0,18)}…</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <div style={{fontSize:11,color:"var(--dim)",padding:"4px 10px",background:"var(--bg2)",borderRadius:20}}>Early termination</div>
          <div style={{fontSize:11,color:"var(--dim)",padding:"4px 10px",background:"var(--bg2)",borderRadius:20}}>Deposits released</div>
          <div style={{fontSize:11,color:"var(--dim)",padding:"4px 10px",background:"var(--bg2)",borderRadius:20}}>⛓️ Ethereum Mainnet</div>
        </div>
      </div>
    );
  }
  const MR = listing.price;
  const isLL = role === "landlord";
  const yieldAPY = 4.2;

  const durationMonths = 6;
  const startDate = new Date(signedAt);
  const endDate = new Date(startDate);
  endDate.setMonth(endDate.getMonth() + durationMonths);
  const nextPayment = new Date(startDate);
  nextPayment.setMonth(nextPayment.getMonth() + 1);
  const daysLeft = Math.max(0, Math.ceil((nextPayment - new Date()) / (1000*60*60*24)));
  const daysTotal = Math.ceil((endDate - startDate) / (1000*60*60*24));
  const daysElapsed = Math.ceil((new Date() - startDate) / (1000*60*60*24));
  const progressPct = Math.min(100, Math.round(daysElapsed / daysTotal * 100));

  // Commitment Deposit yield: 70% to each party (split of combined staking pool)
  const commitYield = (MR * 2 * yieldAPY / 100 / 12 * 0.70 / 2).toFixed(2);
  const hostYield   = commitYield;
  const pi2piDepCut = (MR * 2 * yieldAPY / 100 / 12 * 0.30).toFixed(2);

  // Property Security Deposit yield: 70% tenant, 30% pi2pi
  const safeDepAmt       = Number(propDepAmount) || 0;
  const propDepYield     = propDepIncluded ? (safeDepAmt * yieldAPY / 100 / 12 * 0.70).toFixed(2) : "0";
  const propDepPi2piCut  = propDepIncluded ? (safeDepAmt * yieldAPY / 100 / 12 * 0.30).toFixed(2) : "0";

  // useState hooks moved to top of function

  // Override daysLeft for demo ending contracts
  const contractDaysLeft = contract.daysLeft !== undefined ? contract.daysLeft : daysLeft;
  const payRent = () => { setPaying(true); setTimeout(()=>{ setPaying(false); setPaid(true); }, 1800); };

  const fmt = d => new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
  const Row = ({l,r,c}) => (
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <span style={{fontSize:12,color:"var(--muted)"}}>{l}</span>
      <span style={{fontSize:12,fontWeight:700,color:c||"var(--text)"}}>{r}</span>
    </div>
  );

  return (
    <div className="sc-card" style={{marginBottom:16,border:"1.5px solid var(--green)",background:"rgba(0,166,153,0.03)"}}>

      {/* ── Header ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"var(--green)",boxShadow:"0 0 0 3px rgba(0,166,153,0.25)",animation:"pulse 2s infinite"}}/>
            <span style={{fontSize:11,fontWeight:800,color:"var(--green)",textTransform:"uppercase",letterSpacing:"0.5px"}}>Active Contract</span>
          </div>
          <div style={{fontWeight:700,fontSize:15}}>{listing.title}</div>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>📍 {listing.location}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:20,fontWeight:800}}>{MR.toLocaleString()}</div>
          <div style={{fontSize:11,color:"var(--muted)"}}>USDT / mo</div>
        </div>
      </div>

      {/* ── Progress bar ── */}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style={{fontSize:11,color:"var(--muted)"}}>{fmt(startDate)}</span>
          <span style={{fontSize:11,fontWeight:700,color:"var(--accent)"}}>{progressPct}% complete</span>
          <span style={{fontSize:11,color:"var(--muted)"}}>{fmt(endDate)}</span>
        </div>
        <div style={{height:6,background:"var(--border2)",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${progressPct}%`,background:"linear-gradient(90deg,var(--teal),var(--accent))",borderRadius:99,transition:"width 0.5s"}}/>
        </div>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:4,textAlign:"center"}}>{durationMonths} months · tx {txHash.slice(0,8)}…{txHash.slice(-4)}</div>
      </div>

      {/* ── Commitment Deposit (Tenant) / Hosting Deposit (Landlord) in Aave ── */}
      <div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:"#7c3aed",marginBottom:8}}>🔐 {isLL ? "Hosting Deposit" : "Commitment Deposit"} — Aave v2</div>
        <Row l="Locked amount" r={`${MR.toLocaleString()} USDT`}/>
        <Row l="APY" r={`~${yieldAPY}%`} c="#7c3aed"/>
        <Row l="Your yield / month" r={`+${isLL ? hostYield : commitYield} USDT`} c="#059669"/>
        <Row l="pi2pi protocol fee" r={`${pi2piDepCut} USDT / mo`}/>
        <div style={{fontSize:10,color:"var(--muted)",marginTop:6,paddingTop:6,borderTop:"1px solid #ede9fe",lineHeight:1.5}}>
          {isLL
            ? "Auto-transferred to tenant if property is unavailable or contract terminated by landlord."
            : "Auto-transferred to landlord if rent is missed. Returned to you at contract end."}
        </div>
      </div>

      {/* ── Property Security Deposit (if included) ── */}
      {propDepIncluded && (
        <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:8}}>🏠 Property Security Deposit — Aave v2</div>
          <Row l="Locked amount" r={`${(Number(propDepAmount)||0).toLocaleString()} USDT (${propDepMultiplier}× MR)`}/>
          <Row l="APY" r={`~${yieldAPY}%`} c="#16a34a"/>
          {!isLL && <Row l="Your yield / month" r={`+${propDepYield} USDT`} c="#059669"/>}
          <Row l="pi2pi protocol fee" r={`${propDepPi2piCut} USDT / mo`}/>
          <div style={{fontSize:10,color:"var(--muted)",marginTop:6,paddingTop:6,borderTop:"1px solid #bbf7d0",lineHeight:1.5}}>
            Returned in full to tenant on checkout if no damage is claimed. Landlord may file a damage claim within 72h of checkout.
          </div>
        </div>
      )}

      {/* ── Next payment — Tenant ── */}
      {!isLL && !contract.earlyTermination && (
        <div style={{background:daysLeft<=5?"#fef2f2":"#f8fafc",border:`1.5px solid ${daysLeft<=5?"#fca5a5":"var(--border)"}`,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:11,fontWeight:700,color:daysLeft<=5?"#dc2626":"var(--text)"}}>
              {daysLeft<=5?"⚠️ Urgent —":""} 💸 Next rent payment
            </span>
            <span style={{fontSize:12,fontWeight:800}}>{fmt(nextPayment)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:12,color:"var(--muted)"}}>{MR.toLocaleString()} USDT</span>
            <span style={{fontSize:11,fontWeight:700,color:daysLeft<=5?"#dc2626":"var(--muted)"}}>{daysLeft} day{daysLeft!==1?"s":""} left</span>
          </div>
          {paid
            ? <div style={{textAlign:"center",fontSize:13,fontWeight:700,color:"var(--green)",padding:"10px 0"}}>✓ Paid — recorded on-chain</div>
            : <button onClick={payRent} disabled={paying}
                style={{width:"100%",padding:"11px",borderRadius:10,background:daysLeft<=5?"#dc2626":"var(--accent)",color:"white",border:"none",fontFamily:"var(--ff)",fontWeight:800,fontSize:14,cursor:paying?"not-allowed":"pointer",opacity:paying?0.7:1}}>
                {paying ? "⛓️ Broadcasting…" : `💸 Pay rent — ${MR.toLocaleString()} USDT`}
              </button>
          }
          {!paid && <div style={{fontSize:10,color:"var(--muted)",textAlign:"center",marginTop:6}}>
            Missing payment releases your Commitment Deposit to landlord and terminates the agreement.
          </div>}
        </div>
      )}

      {/* ── Next payment — Landlord ── */}
      {isLL && !contract.earlyTermination && (
        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#059669",marginBottom:6}}>💸 Next payment from tenant</div>
          <Row l={fmt(nextPayment)} r={`${MR.toLocaleString()} USDT`}/>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>{daysLeft} day{daysLeft!==1?"s":""} remaining in window</div>
        </div>
      )}

      {/* ── Contract ending soon alert ── */}
      {!contract.earlyTermination && contractDaysLeft <= 7 && (
        <div style={{background:"#fffbeb",border:"1.5px solid #fcd34d",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:13,color:"#92400e",marginBottom:6}}>
            ⏳ Contract ending in {contractDaysLeft} day{contractDaysLeft!==1?"s":""}
          </div>
          <div style={{fontSize:12,color:"#92400e",lineHeight:1.6,marginBottom:10}}>
            Both parties can renew or proceed to checkout. Security deposits and property deposit will be settled at checkout.
          </div>
          <button onClick={()=>setShowCheckout(true)}
            style={{width:"100%",padding:"11px",borderRadius:10,background:"#f59e0b",color:"white",border:"none",fontFamily:"var(--ff)",fontWeight:800,fontSize:13,cursor:"pointer"}}>
            📋 Open checkout &amp; renewal options
          </button>
        </div>
      )}

      {/* ── Early termination: prominent block or subtle button ── */}
      {contract.earlyTermination ? (
        <div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:10,padding:"12px 14px",marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:13,color:"#dc2626",marginBottom:4}}>⚠️ Early termination</div>
          <div style={{fontSize:12,color:"#7f1d1d",marginBottom:10,lineHeight:1.6}}>
            Month {contract.monthsElapsed} of {contract.monthsTotal}. Either party may initiate at any time.
          </div>
          <button onClick={()=>setShowEarlyTerm(true)}
            style={{width:"100%",padding:"11px",borderRadius:10,background:"#dc2626",color:"white",border:"none",fontFamily:"var(--ff)",fontWeight:800,fontSize:13,cursor:"pointer"}}>
            ⚠️ Open early termination options
          </button>
        </div>
      ) : contractDaysLeft <= 7 ? null : (
        <div style={{padding:"4px 0 4px"}}>
          <button onClick={()=>setShowEarlyTerm(true)}
            style={{width:"100%",padding:"10px",borderRadius:10,background:"white",border:"1.5px solid #fca5a5",color:"#dc2626",fontFamily:"var(--ff)",fontWeight:700,fontSize:12,cursor:"pointer"}}>
            ⚠️ Request early termination
          </button>
        </div>
      )}

      {/* ── Print button ── */}
      <button onClick={()=>setShowPrint(true)}
        style={{width:"100%",padding:"10px",borderRadius:10,background:"#f8fafc",border:"1.5px solid var(--border)",color:"var(--text)",fontFamily:"var(--ff)",fontWeight:700,fontSize:12,cursor:"pointer",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        🖨 Print Lease Agreement &amp; Payment History
      </button>

      {/* ── Footer ── */}
      <div style={{fontSize:11,color:"var(--muted)",textAlign:"center",paddingTop:8,borderTop:"1px solid var(--border)"}}>
        ⛓️ Ethereum Mainnet · <span style={{color:"var(--teal)",cursor:"pointer"}}>View on Etherscan ↗</span>
        {propDepIncluded && <React.Fragment> · <span style={{color:"var(--teal)",cursor:"pointer"}}>PropDep on-chain ↗</span></React.Fragment>}
      </div>

      {showCheckout && <CheckoutFlow contract={contract} role={role} onClose={()=>setShowCheckout(false)} onContractClose={onContractClose}/>}
      {showEarlyTerm && <EarlyTerminationFlow contract={contract} role={role} onClose={()=>setShowEarlyTerm(false)}/>}
      {showPrint && <PrintModal contract={contract} role={role} onClose={()=>setShowPrint(false)}/>}
    </div>
  );
}

function VerifyIntent({ chosenRole, onDone }) {
  const isT = chosenRole === "tenant";
  const [city, setCity] = useState("");
  const [propType, setPropType] = useState(isT ? "1BR" : "Apartment");
  const [budget, setBudget] = useState("");
  const [duration, setDuration] = useState("6");
  const [signing, setSigning] = useState(false);
  const [done, setDone] = useState(false);
  const [accepted, setAccepted] = useState(false);

  const MINS = { "Tbilisi, Georgia": 400, "Buenos Aires, Argentina": 500, "Da Nang, Vietnam": 350 };
  const regionMin = MINS[city] || 0;
  const hardFloor = regionMin ? Math.round(regionMin * 0.8) : 0;
  const budgetNum = parseFloat(budget) || 0;
  const belowMarket = !isT && city && budgetNum > 0 && budgetNum < regionMin;
  const tooLow = !isT && city && budgetNum > 0 && budgetNum < hardFloor;
  const tenantTooLow = isT && city && budgetNum > 0 && budgetNum < regionMin;
  const budgetOk = budgetNum > 0 && !tooLow && !tenantTooLow;
  const canSign = city && budgetOk && (!belowMarket || accepted);

  const sign = () => { setSigning(true); setTimeout(() => { setSigning(false); setDone(true); }, 2200); };
  const finish = () => onDone({ city, propType, budget, duration });

  return <React.Fragment>

        <div>

          />
          {tenantTooLow && <div style={{fontSize:10,color:"var(--accent)",marginTop:3}}>⚠ Minimum is {regionMin} USDT for this region</div>}

        <div>

            <div style={{fontSize:12,color:"#5a4400",lineHeight:1.65,marginBottom:10}}>
              Your listing will be marked <strong>"Below market"</strong>. By proceeding you agree:<br/><br/>
              · You <strong>cannot raise this price</strong> after publishing<br/>
              · You must rent at this price or remove the listing<br/>

            <div className="check-row" style={{background:"white",marginBottom:0}} onClick={()=>setAccepted(a=>!a)}>

  </React.Fragment>;
}

              <span>●</span>
              <span>{user.addr}</span>
              <span style={{background:user.role==="landlord"?"#e8f0fe":"var(--accent-dim)",color:user.role==="landlord"?"#3b5bdb":"var(--accent)",padding:"2px 7px",borderRadius:5,fontSize:10,textTransform:"uppercase",fontWeight:800}}>
                {user.role==="landlord"?"Landlord":"Tenant"}
              </span>
              <span style={{color:"var(--dim)",fontSize:9}}>▾</span>
            </button>
            {/* dropdown moved to shell level to avoid backdrop-filter stacking context */}
          </React.Fragment> : (
            <button className="menu-btn" style={{padding:"7px 16px",fontFamily:"var(--ff)",fontSize:13,fontWeight:700,color:"var(--text)"}} onClick={()=>{setShowDemo(false);setShowProtocol(false);openWallet();}}>Move in</button>
          )}
        </div>
      </header>

      <main>
        {view===null&&nav==="feed"&&<FeedPage role={role} user={user} activeContract={activeContract} onNeedAuth={()=>openWallet("landlord")} onSelect={l=>{setListing(l);setView("prop");}} onCreate={()=>setView("create")}/>}
        {view===null&&nav==="dash"&&<Dashboard role={role} user={user} onUnreadChange={setUnreadCount} activeContract={activeContract}
          viewingRequestedListing={viewingRequestedListing}
          onClearViewingRequest={()=>setViewingRequestedListing(null)}
          chatOpenedListing={chatOpenedListing}
          onClearChatOpened={()=>setChatOpenedListing(null)}
          inboxMsgs={inboxMsgs} onInboxMsgsChange={setInboxMsgs}
          earlyTermState={earlyTermState} onEarlyTermStateChange={setEarlyTermState}
          onContractClose={closeContract}
          onViewListing={id=>{setListing(LISTINGS.find(l=>l.id===id)||LISTINGS[0]);setView("prop");}}
          onOpenChat={id=>{setListing(LISTINGS.find(l=>l.id===id)||LISTINGS[0]);setView("chat");}}
          onStartContract={id=>{setListing(LISTINGS.find(l=>l.id===id)||LISTINGS[0]);setView("contract");}}
        />}
        {view==="create"&&<CreateListing role={role} onBack={()=>setView(null)} onSave={()=>setView(null)}/>}
        {view==="prop"&&<PropertyPage listing={listing||LISTINGS[0]} role={role} user={user} activeContract={activeContract} onBack={()=>setView(null)} onChat={()=>{setView("chat");if(role==="tenant")setChatOpenedListing(listing||LISTINGS[0]);}} onApply={()=>setView("contract-from-prop")} onNeedAuth={()=>openWallet("tenant")} onViewingRequested={(l)=>setViewingRequestedListing(l)}/>}
        {view==="chat"&&<ChatPage listing={listing||LISTINGS[0]} role={role} onBack={()=>{ if(view==="chat") setView(null); else setView("prop"); }} onContract={()=>setView("contract")}/>}
        {view==="contract"&&<ContractFlow listing={listing||LISTINGS[0]} role={role} onBack={()=>setView("chat")} onComplete={(cd)=>{const l=listing||LISTINGS[0];setActiveContract({listing:l,role,signedAt:new Date(),txHash:hashGen(),...cd});setView(null);setNav("dash");}}/>}
        {view==="contract-from-prop"&&<ContractFlow listing={listing||LISTINGS[0]} role={role} onBack={()=>setView("prop")} onComplete={(cd)=>{const l=listing||LISTINGS[0];setActiveContract({listing:l,role,signedAt:new Date(),txHash:hashGen(),...cd});setView(null);setNav("dash");}}/>}
      </main>

      {/* Bottom nav — only when logged in and no deep view */}
      {user && !view && (
        <nav className="bnav">
          <button className={`bnav-btn ${nav==="feed"?"on":""}`} onClick={()=>setNav("feed")}>
            <span className="bnav-icon">🔍</span>
            Explore
          </button>
          <button className={`bnav-btn ${nav==="dash"?"on":""}`} onClick={()=>{setUnreadCount(0);setNav("dash");}}>
            <span className="bnav-icon" style={{position:"relative",display:"inline-block"}}>
              👤
              {unreadCount>0&&<span style={{position:"absolute",top:-2,right:-4,width:8,height:8,background:"var(--accent)",borderRadius:"50%",border:"2px solid white"}}/>}
            </span>
            Account{unreadCount>0?` (${unreadCount})`:""}
          </button>
        </nav>
      )}

      {showWallet&&<WalletModal hint={walletHint} onClose={()=>setShowWallet(false)} onConnected={handleConnected}/>}

      {/* User menu dropdown — rendered via Portal to avoid stacking context */}
      {showUserMenu&&user&&(
        <Portal>
        <div onClick={e=>e.stopPropagation()} style={{
          position:"fixed",
          top: userMenuRect ? userMenuRect.bottom+6 : 64,
          right: userMenuRect ? Math.max(8,window.innerWidth-userMenuRect.right) : 8,
          background:"white",
          border:"1.5px solid var(--border)",
          borderRadius:12,
          boxShadow:"0 4px 28px rgba(0,0,0,0.13)",
          minWidth:180,
          zIndex:9999,
          overflow:"hidden"
        }}>
          <div style={{padding:"12px 14px",borderBottom:"1px solid var(--border)"}}>
            <div style={{fontWeight:700,fontSize:13}}>{user.name}</div>
            <div style={{fontFamily:"monospace",fontSize:10,color:"var(--muted)",marginTop:2}}>{user.addr}</div>
          </div>
          <button onClick={()=>{setShowUserMenu(false);setView(null);setNav("dash");}}
            style={{width:"100%",padding:"11px 14px",background:"none",border:"none",borderBottom:"1px solid var(--border)",cursor:"pointer",fontFamily:"var(--ff)",fontSize:13,fontWeight:600,color:"var(--text)",textAlign:"left",display:"flex",alignItems:"center",gap:8}}
            onMouseOver={e=>e.currentTarget.style.background="var(--bg2)"}
            onMouseOut={e=>e.currentTarget.style.background="none"}
          >
            👤 My account
          </button>
          <button onClick={disconnect}
            style={{width:"100%",padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontFamily:"var(--ff)",fontSize:13,fontWeight:600,color:"var(--accent)",textAlign:"left",display:"flex",alignItems:"center",gap:8}}
            onMouseOver={e=>e.currentTarget.style.background="var(--bg2)"}
            onMouseOut={e=>e.currentTarget.style.background="none"}
          >
            ⏏ Disconnect
          </button>
        </div>
        </Portal>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- Password protection screen — pure HTML/CSS/JS, no React dependency -->
  <script>
    (function() {
      const PASS = "S#9kL2!xPq7";
      const SESSION_KEY = "pi2pi_auth";

      // Already authenticated this session?
      if (sessionStorage.getItem(SESSION_KEY) === "1") return;

      // Build the gate overlay
      const gate = document.createElement("div");
      gate.id = "pw-gate";
      gate.innerHTML = `
        <style>
          #pw-gate {
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
          }
          #pw-box {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 40px 32px 36px;
            width: 100%;
            max-width: 360px;
            margin: 16px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.7);
            text-align: center;
          }
          #pw-logo {
            font-family: Georgia, serif;
            font-size: 26px;
            font-weight: 400;
            color: #FF5A5F;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
          }
          #pw-sub {
            font-size: 12px;
            color: #555;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 32px;
          }
          #pw-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            text-align: left;
          }
          #pw-input-wrap {
            position: relative;
            margin-bottom: 14px;
          }
          #pw-input {
            width: 100%;
            padding: 13px 44px 13px 16px;
            background: #111;
            border: 1.5px solid #333;
            border-radius: 11px;
            color: #fff;
            font-size: 16px;
            font-family: monospace;
            letter-spacing: 2px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
          }
          #pw-input:focus { border-color: #555; }
          #pw-input.error { border-color: #FF5A5F; animation: shake 0.35s ease; }
          #pw-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #555;
            font-size: 15px;
            padding: 4px;
            line-height: 1;
          }
          #pw-toggle:hover { color: #999; }
          #pw-btn {
            width: 100%;
            padding: 14px;
            background: #FF5A5F;
            border: none;
            border-radius: 11px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.18s, transform 0.1s;
            margin-top: 2px;
          }
          #pw-btn:hover { background: #e04a4f; }
          #pw-btn:active { transform: scale(0.98); }
          #pw-error {
            font-size: 12px;
            color: #FF5A5F;
            margin-top: 10px;
            min-height: 18px;
            font-weight: 600;
          }
          #pw-footer {
            margin-top: 28px;
            font-size: 11px;
            color: #333;
          }
          @keyframes shake {
            0%,100%{ transform:translateX(0); }
            20%    { transform:translateX(-6px); }
            40%    { transform:translateX(6px); }
            60%    { transform:translateX(-4px); }
            80%    { transform:translateX(4px); }
          }
          @keyframes fadeout {
            to { opacity: 0; transform: scale(1.03); }
          }
          #pw-gate.leaving {
            animation: fadeout 0.35s ease forwards;
            pointer-events: none;
          }
        </style>
        <div id="pw-box">
          <div id="pw-logo">pi2pi.io</div>
          <div id="pw-sub">Private Demo</div>
          <label id="pw-label" for="pw-input">Access Password</label>
          <div id="pw-input-wrap">
            <input id="pw-input" type="password" placeholder="••••••••••••" autocomplete="off" spellcheck="false"/>
            <button id="pw-toggle" type="button" title="Show/hide">👁</button>
          </div>
          <button id="pw-btn">Enter →</button>
          <div id="pw-error"></div>
          <div id="pw-footer">Authorised access only</div>
        </div>
      `;

      document.body.appendChild(gate);

      const input   = gate.querySelector("#pw-input");
      const btn     = gate.querySelector("#pw-btn");
      const errEl   = gate.querySelector("#pw-error");
      const toggle  = gate.querySelector("#pw-toggle");
      let attempts  = 0;

      function unlock() {
        gate.classList.add("leaving");
        sessionStorage.setItem(SESSION_KEY, "1");
        setTimeout(() => gate.remove(), 380);
      }

      function attempt() {
        if (input.value === PASS) {
          unlock();
        } else {
          attempts++;
          errEl.textContent = attempts >= 3
            ? "Incorrect password. Check caps lock."
            : "Incorrect password.";
          input.classList.add("error");
          input.value = "";
          setTimeout(() => input.classList.remove("error"), 400);
          input.focus();
        }
      }

      btn.addEventListener("click", attempt);
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") attempt();
        if (errEl.textContent) errEl.textContent = "";
      });
      toggle.addEventListener("click", function() {
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        toggle.textContent = show ? "🙈" : "👁";
      });

      // Focus input after fonts load
      setTimeout(() => input.focus(), 100);
    })();
  </script>
